<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">World Cup Betting EDP single match preview</title>
  <desc id="desc">Single match 1X2 probability pricing dashboard preview with market and model probabilities, value bet decision, and Kelly sizing.</desc>
