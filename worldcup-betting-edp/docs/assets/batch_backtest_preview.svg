<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">World Cup Betting EDP batch backtest preview</title>
  <desc id="desc">Batch backtest dashboard preview with summary metrics, model versus market scores, flat-stake settlement, and Kelly bankroll curve.</desc>
  <rect width="1200" height="720" fill="#f6f8fb"/>
  <rect x="52" y="44" width="1096" height="632" rx="18" fill="#ffffff" stroke="#d8dee9"/>
  <text x="92" y="106" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#101828">Batch Backtest</text>
  <text x="92" y="140" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#667085">Manifest-driven scoring, flat-stake settlement, and Kelly bankroll curve</text>

  <g>
    <rect x="92" y="184" width="178" height="88" rx="10" fill="#f9fafb" stroke="#e4e7ec"/>
    <text x="116" y="218" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#667085">Entries</text>
    <text x="116" y="250" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#101828">1</text>
  </g>
  <g>
    <rect x="292" y="184" width="178" height="88" rx="10" fill="#f9fafb" stroke="#e4e7ec"/>
    <text x="316" y="218" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#667085">Flat ROI</text>
    <text x="316" y="250" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#101828">120.00%</text>
  </g>
  <g>
    <rect x="492" y="184" width="178" height="88" rx="10" fill="#f9fafb" stroke="#e4e7ec"/>
    <text x="516" y="218" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#667085">Kelly Final</text>
    <text x="516" y="250" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#101828">101.95</text>
  </g>
  <g>
    <rect x="692" y="184" width="178" height="88" rx="10" fill="#f9fafb" stroke="#e4e7ec"/>
    <text x="716" y="218" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#667085">Max Drawdown</text>
    <text x="716" y="250" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#101828">0.00%</text>
  </g>
  <g>
    <rect x="892" y="184" width="178" height="88" rx="10" fill="#f9fafb" stroke="#e4e7ec"/>
    <text x="916" y="218" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#667085">Hit Rate</text>
    <text x="916" y="250" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#101828">100.00%</text>
  </g>

  <text x="92" y="342" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#101828">Kelly Bankroll Curve</text>
  <line x1="92" y1="560" x2="690" y2="560" stroke="#d0d5dd"/>
  <line x1="92" y1="492" x2="690" y2="492" stroke="#eaecf0"/>
  <line x1="92" y1="424" x2="690" y2="424" stroke="#eaecf0"/>
  <polyline points="120,520 630,424" fill="none" stroke="#175cd3" stroke-width="5"/>
  <circle cx="120" cy="520" r="8" fill="#175cd3"/>
  <circle cx="630" cy="424" r="8" fill="#175cd3"/>
  <text x="105" y="594" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#344054">Start 100.00</text>
  <text x="588" y="594" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#344054">Final 101.95</text>

  <text x="760" y="342" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#101828">Model vs Market</text>
  <rect x="786" y="396" width="44" height="154" fill="#7cc4fa"/>
  <rect x="840" y="362" width="44" height="188" fill="#175cd3"/>
  <text x="775" y="582" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#344054">Brier</text>

  <rect x="964" y="414" width="44" height="136" fill="#7cc4fa"/>
  <rect x="1018" y="383" width="44" height="167" fill="#175cd3"/>
  <text x="944" y="582" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#344054">Log Loss</text>

  <rect x="778" y="616" width="18" height="18" fill="#7cc4fa"/>
  <text x="806" y="631" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#344054">Model</text>
  <rect x="900" y="616" width="18" height="18" fill="#175cd3"/>
  <text x="928" y="631" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#344054">Market</text>
</svg>
